{id:2,type:"sparkling",emoji:"🫧",name:"Bruni Prosecco Rosé Brut",origin:"Италия, Венето",price:"3 600 ₸",storyTitle:"Розовый бунт 2020 года",story:"Розовое Просекко получило официальный статус DOC лишь в 2020 году — итальянские виноделы долго сопротивлялись этой идее, считая её «не серьёзной». Но когда наконец разрешили — рынок взорвался. За первый год было продано более 30 миллионов бутылок. Чтобы получить розовый цвет, в купаж добавляют не менее 10% Пино Неро — это добавляет характер и лёгкую ягодность.",tastes:["Клубника","Малина","Роза","Свежая кислотность"],pair:"Карпаччо, лёгкие пасты, свежие ягоды"},
{id:3,type:"sparkling",emoji:"🫧",name:"Bruni Asti",origin:"Италия, Пьемонт",price:"3 200 ₸",storyTitle:"Муссолини его ненавидел, Гарибальди обожал",story:"Асти Спуманте — вино с бурной политической историей. Джузеппе Гарибальди, объединитель Италии, называл его «солнцем в бокале» и требовал подавать на всех банкетах в честь объединения страны. Муссолини же, напротив, считал его «бабским напитком» и предпочитал тяжёлое красное. История рассудила: Асти пережило дуче и по сей день остаётся символом праздника. Всего 7% алкоголя — и весь Пьемонт в одном глотке.",tastes:["Мускат","Белый абрикос","Мёд","Свежие цветы"],pair:"Панна котта, фруктовые десерты, тирамису"},
{id:4,type:"sparkling",emoji:"🫧",name:"Fantinel Prosecco Extra Dry",origin:"Италия, Фриули-Венеция-Джулия",price:"3 400 ₸",storyTitle:"Семья, пережившая две войны ради одного виноградника",story:"Семья Фантинель начала делать вино в 1969 году на землях, где ещё помнили следы Первой и Второй мировых войн — провинция Фриули была линией фронта дважды. Основатель хозяйства Марио Фантинель говорил: «Немцы и австрийцы воевали за эту землю, а мы будем делать из неё вино». Сегодня Fantinel — один из крупнейших экспортёров Просекко, а их виноградники внесены в список Всемирного наследия ЮНЕСКО.",tastes:["Яблоко","Белые цветы","Цитрус","Минеральность"],pair:"Фрутти ди маре, рыбные тарелки, устрицы"},
{id:5,type:"sparkling",emoji:"🫧",name:"Cava Sumarroca Brut Nature Gran Reserva",origin:"Испания, Пенедес",price:"8 900 ₸",storyTitle:"Кава, которую Пикассо пил вместо шампанского",story:"Говорят, Пабло Пикассо, живший попеременно в Барселоне и Париже, специально заказывал каву из Пенедеса — он считал, что французы «переоценили себя с шампанским». Была ли это правда или красивая легенда — неизвестно. Но одно точно: Gran Reserva с выдержкой 30+ месяцев на осадке и нулевым досажем действительно бросает вызов Шампани. Тосты, орехи, лимонный крем — это не Просекко, это серьёзный разговор.",tastes:["Тосты","Лесной орех","Лимонный крем","Зелёное яблоко"],pair:"Морские гребешки, выдержанные сыры, чёрная икра"},
{id:6,type:"sparkling",emoji:"🫧",name:"Crémant d'Alsace Extra Brut Paul-Edouard",origin:"Франция, Эльзас",price:"12 300 ₸",storyTitle:"Регион двух флагов и одного великого вина",story:"Эльзас — земля, которую Франция и Германия делили веками: до 1919 года, с 1940 по 1944 — снова Германия. Именно поэтому эльзасская культура уникальна: французские рецепты в немецких домах, немецкие сорта под французскими названиями. Кремант отражает этот дуализм: строгость и кислотность от Рислинга — немецкая душа, метод и элегантность — французская. Paul-Edouard — небольшое семейное хозяйство, где всё ещё помнят оба языка.",tastes:["Белые цветы","Зелёное яблоко","Цедра лимона","Хлебная корочка"],pair:"Фуа-гра, устрицы, флам-кюш (эльзасский пирог)"},
{id:7,type:"white",emoji:"🥂",name:"Chenin Blanc",origin:"Южная Африка",price:"5 600 ₸",storyTitle:"Французский беглец, ставший королём Африки",story:"Шенен Блан привезли в Южную Африку в 1655 году — первые европейские поселенцы у мыса Доброй Надежды. Во Франции (в Луаре) этот сорт был капризным и непредсказуемым. Но южноафриканское солнце и известняковые почвы сделали его послушным. Сегодня в ЮАР выращивают 18% всего мирового Шенена — больше, чем во Франции. Местные говорят: «Шенен приехал в Африку туристом и остался навсегда».",tastes:["Гуава","Манго","Мёд","Свежая кислотность"],pair:"Карри с курицей, тайская кухня, козий сыр"},
{id:8,type:"white",emoji:"🥂",name:"Santa Carolina Gran Reserva Chardonnay",origin:"Чили",price:"5 400 ₸",storyTitle:"Вино, основанное на спор",story:"Хозяйство Santa Carolina основал в 1875 году Луис Перейра Котапос — в честь своей жены Каролины. По легенде, друзья поспорили, что на чилийских землях невозможно сделать вино уровня бургундского. Перейра принял вызов и выиграл: уже в 1889 году на Парижской выставке чилийское вино получило золотую медаль — и хозяйство Каролины навсегда вошло в историю.",tastes:["Ваниль","Масло","Тропические фрукты","Поджаренный дуб"],pair:"Паста с трюфельным маслом, курица в сливочном соусе, буррата"},
{id:9,type:"white",emoji:"🥂",name:"Paddle Creek Sauvignon Blanc Marlborough",origin:"Новая Зеландия",price:"3 900 ₸",storyTitle:"Как один энолог изменил мировое виноделие",story:"До 1973 года никто не воспринимал Новую Зеландию всерьёз в мире вина. Потом энолог Монтана посадил первые лозы Совиньона в Мальборо — и через 10 лет весь мир сходил с ума. В 1985 году Marks & Spencer закупили партию мальборского Совиньона для английских супермаркетов — очереди выстраивались с ночи. Говорят, именно это вино спасло New Zealand Wine Industry от банкротства и сделало страну винной державой.",tastes:["Крыжовник","Маракуйя","Зелёный перец","Свежескошенная трава"],pair:"Козий сыр, устрицы, суши, лёгкие салаты"},
{id:10,type:"white",emoji:"🥂",name:"Domini Veneti Soave Classico",origin:"Италия, Венето",price:"6 800 ₸",storyTitle:"Вино Ромео и Джульетты",story:"Соаве делают в холмах к востоку от Вероны — того самого города Ромео и Джульетты. Шекспир, хотя никогда не был в Италии, точно слышал о местном вине: в «Укрощении строптивой» он упоминает «белое венецианское». Зная итальянское гостеприимство — трудно представить, что герои Шекспира пили что-то другое. Соаве из базальтовых почв холмов Classico — деликатное, цветочное, с миндальной горчинкой финале.",tastes:["Белые цветы","Белый персик","Миндаль","Лёгкая минеральность"],pair:"Ризотто с морепродуктами, нежная белая рыба, моцарелла"},
{id:11,type:"white",emoji:"🥂",name:"Ilusionista Verdejo Rueda",origin:"Испания, Руэда",price:"6 300 ₸",storyTitle:"Сорт, который искали 500 лет",story:"Вердехо считался исчезнувшим в XV веке после арабского завоевания — мусульмане запрещали вино, виноградники вырубались. Но монахи в Руэде тайно сохранили несколько лоз — якобы «для причастия». Когда в 1970-х энологи занялись возрождением местного виноделия, они нашли эти старинные лозы и были потрясены: 500-летние кусты давали урожай. Ilusionista — «иллюзионист» — назван так именно в честь этого чуда исчезновения и возвращения.",tastes:["Грейпфрут","Белый миндаль","Травы","Горькая нотка в финале"],pair:"Морепродукты, севиче, сыры манчего"},
{id:12,type:"white",emoji:"🥂",name:"Балет Блан",origin:"Россия, Краснодарский край",price:"7 400 ₸",storyTitle:"Вино, рождённое из стадиона",story:"Хозяйство «Галицкий и Галицкий» основал Сергей Галицкий — тот самый, что создал «Магнит» и построил стадион в Краснодаре. Говорят, когда он выбирал, куда вложить деньги после продажи сети, друзья советовали яхты и острова. Он купил виноградники. «Балет Блан» — воздушное белое из нескольких сортов, выращенных в Тамани. Название отсылает не к балету, а к белому цвету и лёгкости — как первый снег или утренний туман над лозами.",tastes:["Белые цветы","Цитрус","Зелёное яблоко","Лёгкая минеральность"],pair:"Судак на гриле, кубанские овощи, лёгкие закуски"},
{id:13,type:"white",emoji:"🥂",name:"Riesling Mosel",origin:"Германия, Мозель",price:"4 900 ₸",storyTitle:"Вино, за которое воевали наполеоновские солдаты",story:"В 1803 году, когда армия Наполеона прошла через Мозель, солдаты отказывались уходить из деревень, пока не допьют местный Рислинг. По легенде, один из генералов написал в штаб: «Мои люди согласны воевать — но только после того, как выпьют ещё одну бутылку». Склоны Мозеля — одни из крутейших в мире: 60–70 градусов, сланцевая порода. Всё делается вручную. Именно поэтому вино стоит своих денег.",tastes:["Лайм","Зелёное яблоко","Мокрый сланец","Цветочный мёд"],pair:"Речная рыба, сыры с плесенью, свиная рулька"},
{id:14,type:"white",emoji:"🥂",name:"Chablis Sainte Claire",origin:"Франция, Бургундия",price:"12 400 ₸",storyTitle:"Вино из ракушек юрского периода",story:"100 миллионов лет назад на месте Шабли было тёплое море. Когда оно ушло, остались белые скалы из раковин устриц и аммонитов — это и есть знаменитый кимериджский известняк, душа Шабли. Местные виноделы говорят: когда вы пьёте Шабли — вы пьёте море. Это не метафора: в вине буквально ощущается солёная свежесть, напоминающая о морском бризе и живых устрицах. Неслучайно устрицы и Шабли — один из самых известных гастрономических союзов в мире.",tastes:["Лимон","Белый персик","Кремень","Йодистая свежесть"],pair:"Устрицы, гребешки, рыба под лимонным маслом"},
{id:15,type:"white",emoji:"🥂",name:"Gavi dei Gavi",origin:"Италия, Пьемонт",price:"9 900 ₸",storyTitle:"Вино, которое освободило город",story:"Гави — небольшой средневековый городок в Пьемонте, который в Средние века был спорным между Генуей и Миланом. По преданию, однажды представители обеих сторон встретились для переговоров за бочкой местного белого вина. Вино оказалось настолько примирительным, что договор был подписан в тот же вечер — и город обрёл покой. «Gavi dei Gavi» означает «лучшее из лучших» аппеллясьона — и каждый год подтверждает свою репутацию.",tastes:["Белый цветок","Миндаль","Лимонная цедра","Горькая нотка"],pair:"Трюфельное ризотто, телятина, паста с белыми грибами"},
{id:16,type:"red",emoji:"🍷",name:"Hacienda Lopez de Haro Crianza",origin:"Испания, Риоха",price:"3 900 ₸",storyTitle:"Вино, которое пил Хемингуэй в Памплоне",story:"В «Фиесте» Хемингуэй описывает, как герои пьют риохское вино прямо из бурдюка, запрокинув голову, не касаясь горлышка губами — испанский ритуал. Сам писатель годами приезжал в Памплону на фестиваль Сан-Фермин и неизменно требовал именно риохское Крианса. «Только дурак пьёт что-то другое в Испании», — якобы говорил он. Crianza означает минимум год в дубовых бочках — вино обретает ваниль, табак и пряность.",tastes:["Вишня","Ваниль","Кожа","Лёгкий табак"],pair:"Ягнёнок на гриле, пицца, твёрдые сыры"},

let currentFilter='all',currentSearch='';

function renderWines(){
  const grid=document.getElementById('grid');
  const filtered=wines.filter(w=>{
    const mf=currentFilter==='all'||w.type===currentFilter;
    const q=currentSearch.toLowerCase();
    const ms=!q||w.name.toLowerCase().includes(q)||w.origin.toLowerCase().includes(q)||w.story.toLowerCase().includes(q)||w.tastes.some(t=>t.toLowerCase().includes(q));
    return mf&&ms;
  });
  if(!filtered.length){grid.innerHTML='<div class="empty">Вин не найдено. Попробуйте другой запрос.</div>';return;}
  const groups=[{label:'✨ Игристые вина',type:'sparkling'},{label:'🥂 Белые вина',type:'white'},{label:'🍷 Красные вина',type:'red'},{label:'🌸 Розовые вина',type:'rose'}];
  let html='';
  groups.forEach(g=>{
    const gw=filtered.filter(w=>w.type===g.type);
    if(!gw.length)return;
    if(currentFilter==='all')html+=`<div class="section-label">${g.label}</div>`;
    gw.forEach(w=>{
      const typeLabel=w.type==='sparkling'?'Игристое':w.type==='white'?'Белое':w.type==='red'?'Красное':'Розовое';
      html+=`<div class="wine-card" id="card-${w.id}" onclick="toggleCard(${w.id})">
        <div class="card-header">
          <div class="wine-badge badge-${w.type}">${w.emoji}</div>
          <div class="card-meta">
            <div class="wine-name">${w.name}</div>
            <div class="wine-origin">${w.origin}</div>
          </div>
          <div class="wine-price">${w.price}</div>
          <span class="chevron">▾</span>
        </div>
        <div class="card-body">
          <span class="story-tag tag-${w.type}">${typeLabel}</span>
          <div class="story-title">${w.storyTitle}</div>
          <div class="story-text">${w.story}</div>
          <div class="taste-row">${w.tastes.map(t=>`<span class="taste-pill">${t}</span>`).join('')}</div>
          <div class="pair-row">К столу: <span>${w.pair}</span></div>
        </div>
      </div>`;
    });
  });
  grid.innerHTML=html;
}

function toggleCard(id){
  document.getElementById('card-'+id).classList.toggle('open');
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    renderWines();
  });
});

document.getElementById('search').addEventListener('input',e=>{
  currentSearch=e.target.value;
  renderWines();
});

renderWines();
</script>
